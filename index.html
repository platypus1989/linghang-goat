<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>领航 · Navigating the AI Era — Team GOAT</title>
  <meta name="description" content="领航十一期 · Team GOAT — Navigating the AI Era. 在 AI 加速变化的时代，我们一起寻找自己的方向。" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Favicon -->
  <link
    rel="icon"
    href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23050610' stroke='%235EE4D5' stroke-width='1.5'/><circle cx='16' cy='16' r='2' fill='%238B7CFF'/><path d='M16 4 L18 14 L28 16 L18 18 L16 28 L14 18 L4 16 L14 14 Z' fill='%235EE4D5' opacity='0.85'/></svg>"
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Top nav -->
  <nav class="nav" id="nav">
    <a href="#hero" class="nav-logo" aria-label="领航 · Navigating the AI Era">
      <!-- Logo: compass star (Navigating) inside a thin orbit -->
      <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <circle cx="16" cy="16" r="13.5" stroke="currentColor" stroke-width="1" opacity="0.55" />
        <path
          d="M16 3 L18 14 L29 16 L18 18 L16 29 L14 18 L3 16 L14 14 Z"
          fill="url(#logoGrad)"
          opacity="0.95"
        />
        <circle cx="16" cy="16" r="1.6" fill="#F5F6FA" />
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#8B7CFF" />
            <stop offset="100%" stop-color="#5EE4D5" />
          </linearGradient>
        </defs>
      </svg>
      <span>领航 · Team GOAT</span>
    </a>
    <div class="nav-links">
      <a href="#journey">旅程</a>
      <a href="#spotlight">成员</a>
      <a href="#mentors">导师</a>
      <a href="#ask">Ask</a>
      <a href="#reflection">共鸣</a>
    </div>
  </nav>

  <!-- ============ HERO ============ -->
  <section class="hero" id="hero">
    <div class="hero-canvas">
      <div class="hero-aurora"></div>
      <div class="hero-grain"></div>
    </div>
    <a class="hero-qr" href="images/qrcode_linghang-goat.png" aria-label="Open QR code">
      <img src="images/qrcode_linghang-goat.png" alt="领航 Team GOAT QR code" />
    </a>
    <div class="hero-inner">
      <div class="hero-kicker" id="hero-kicker"></div>
      <h1 class="hero-title" id="hero-title"></h1>
      <div class="hero-title-zh" id="hero-title-zh"></div>
      <p class="hero-sub" id="hero-sub"></p>
      <p class="hero-body" id="hero-body"></p>
      <a href="#journey" class="hero-cta" id="hero-cta">
        <span></span>
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 2 V14 M3 9 L8 14 L13 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <div class="hero-scroll-hint">SCROLL</div>
    </div>
  </section>

  <!-- ============ JOURNEY ============ -->
  <section class="journey" id="journey">
    <div class="container">
      <div class="eyebrow fade-in"><span>OUR YEAR</span></div>
      <h2 class="section-title fade-in">这一年我们走过的路</h2>
      <p class="section-subtitle fade-in">从初识到出发——七个节点，一个共同的航向。</p>
      <div class="journey-track" id="journey-track"></div>
    </div>
  </section>

  <!-- ============ MEMBER SPOTLIGHT ============ -->
  <section class="spotlight" id="spotlight">
    <div class="container">
      <div class="eyebrow fade-in"><span>10 VOICES</span></div>
      <h2 class="section-title fade-in">每个人的 30 秒</h2>
      <p class="section-subtitle fade-in">十位同行者，十个真实的转折点。</p>

      <div class="spotlight-stage">
        <div class="spotlight-avatar" id="sp-avatar">
          <img class="spotlight-photo" id="sp-photo" alt="" />
          <div class="spotlight-avatar-initials" id="sp-initials">L</div>
        </div>
        <div class="spotlight-card">
          <div class="spotlight-hint" id="sp-hint">30 SEC · SPOTLIGHT</div>
          <div class="spotlight-header">
            <div>
              <h3 class="spotlight-name" id="sp-name"></h3>
              <div class="spotlight-role" id="sp-role"></div>
            </div>
            <div class="spotlight-tag" id="sp-tag"></div>
          </div>
          <div class="spotlight-keyword" id="sp-keyword"></div>
          <div class="spotlight-takeaway" id="sp-takeaway"></div>
          <div class="spotlight-next">
            <span class="spotlight-next-label">What's Next</span>
            <span class="spotlight-next-text" id="sp-next"></span>
          </div>
        </div>
      </div>

      <div class="spotlight-controls">
        <div class="spotlight-progress">
          <div class="spotlight-progress-track">
            <div class="spotlight-progress-fill" id="sp-progress"></div>
          </div>
          <div class="spotlight-counter" id="sp-counter">01 / 10</div>
        </div>
        <div class="spotlight-buttons">
          <button class="btn-autoplay" id="sp-autoplay" aria-label="autoplay">
            <span class="dot"></span>
            <span>AUTO 30s</span>
          </button>
          <button class="btn-icon" id="sp-prev" aria-label="previous member">
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M10 3 L5 8 L10 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <button class="btn-icon" id="sp-next-btn" aria-label="next member">
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M6 3 L11 8 L6 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </div>

      <div class="spotlight-thumbs" id="sp-thumbs"></div>
    </div>
  </section>

  <!-- ============ MENTOR THANKS ============ -->
  <section class="mentors" id="mentors">
    <div class="mentors-bg"></div>
    <div class="container">
      <div class="eyebrow fade-in"><span>WITH GRATITUDE</span></div>
      <h2 class="section-title fade-in" id="mentors-title"></h2>
      <p class="section-subtitle fade-in" id="mentors-subtitle"></p>
      <div class="mentors-grid" id="mentors-grid"></div>
      <p class="mentors-note fade-in" id="mentors-note"></p>
    </div>
  </section>

  <!-- ============ ASK OUR SEMESTER ============ -->
  <section class="ask" id="ask">
    <div class="ask-bg"></div>
    <div class="container container--narrow">
      <div class="eyebrow fade-in"><span>ASK OUR SEMESTER</span></div>
      <h2 class="section-title fade-in" id="ask-title"></h2>
      <p class="section-subtitle fade-in" id="ask-subtitle"></p>

      <div class="ask-box fade-in">
        <div class="ask-input-row">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 3 L13.5 10.5 L21 12 L13.5 13.5 L12 21 L10.5 13.5 L3 12 L10.5 10.5 Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
          </svg>
          <input type="text" id="ask-input" autocomplete="off" />
          <span class="ask-pulse"><span class="d"></span><span>LIVE</span></span>
        </div>
        <div class="ask-suggestions" id="ask-suggestions"></div>
        <div class="ask-answer" id="ask-answer">
          <div class="ask-answer-label">SEMESTER MEMORY</div>
          <div class="ask-answer-text" id="ask-answer-text"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ COLLECTIVE REFLECTION ============ -->
  <section class="reflection" id="reflection">
    <div class="container">
      <div class="eyebrow fade-in"><span>WHAT STAYED WITH US</span></div>
      <h2 class="section-title fade-in" id="reflection-title">十二个关键词，留在这一年里</h2>
      <div class="reflection-grid">
        <div class="reflection-cloud fade-in" id="reflection-cloud"></div>
        <blockquote class="reflection-quote fade-in" id="reflection-quote"></blockquote>
      </div>
    </div>
  </section>

  <!-- ============ CLOSING ============ -->
  <section class="closing" id="closing">
    <div class="closing-bg"></div>
    <div class="container container--narrow">
      <h2 class="closing-title" id="closing-title"></h2>
      <p class="closing-zh" id="closing-zh"></p>
      <div class="closing-actions">
        <a href="#hero" class="closing-back">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M8 13 V3 M3 7 L8 2 L13 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>Back to the start</span>
        </a>
      </div>
      <div class="closing-credit" id="closing-credit"></div>
    </div>
    <div class="closing-horizon"></div>
    <audio id="closing-rap" preload="auto"></audio>
  </section>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
